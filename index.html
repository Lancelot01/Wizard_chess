/* v2.7：四局並行訓練系統
   主棋局照常顯示；另外三局藏在記憶體中，使用同一套大師級AI、同一套學習/精華棋譜評分標準。
   目的：同一時間等效跑4局，大幅提高自我訓練效率，但不把垃圾局存進精華庫。 */
let parallelTraining=false;
let hiddenTrainingLanes=[];
let hiddenTrainingTimer=null;
let hiddenTrainingStats={hiddenGames:0,totalHiddenMoves:0,laneGames:[0,0,0],lastReason:['-','-','-']};
let hiddenStopAfterRestore=false;

function initialBoardState(){
  return [['br','bn','bb','bq','bk','bb','bn','br'],['bp','bp','bp','bp','bp','bp','bp','bp'],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],['wp','wp','wp','wp','wp','wp','wp','wp'],['wr','wn','wb','wq','wk','wb','wn','wr']];
}
function newHiddenLane(i){
  return {id:i,B:initialBoardState(),turn:'w',castling:{w:{K:true,Q:true},b:{K:true,Q:true}},enPassant:null,halfmoveClock:0,history:[],moveTrace:[],gameMoves:[],learnTrace:{w:[],b:[]},plies:0,ended:false};
}
function saveVisibleStateForHidden(){
  return {B,turn,castling,enPassant,halfmoveClock,winningEndgameClock,history,moveTrace,gameMoves,learnTrace,gameOver,lastMove,selected,legal,taken,animating,aiThinking};
}
function loadLaneState(lane){
  B=lane.B; turn=lane.turn; castling=lane.castling; enPassant=lane.enPassant; halfmoveClock=lane.halfmoveClock;
  history=lane.history; moveTrace=lane.moveTrace; gameMoves=lane.gameMoves; learnTrace=lane.learnTrace;
  gameOver=false; selected=null; legal=[]; lastMove=null;
}
function storeLaneState(lane){
  lane.B=B; lane.turn=turn; lane.castling=castling; lane.enPassant=enPassant; lane.halfmoveClock=halfmoveClock;
  lane.history=history; lane.moveTrace=moveTrace; lane.gameMoves=gameMoves; lane.learnTrace=learnTrace; lane.plies=gameMoves.length;
}
function restoreVisibleStateForHidden(v){
  B=v.B; turn=v.turn; castling=v.castling; enPassant=v.enPassant; halfmoveClock=v.halfmoveClock; winningEndgameClock=v.winningEndgameClock||0; history=v.history;
  moveTrace=v.moveTrace; gameMoves=v.gameMoves; learnTrace=v.learnTrace; gameOver=v.gameOver; lastMove=v.lastMove;
  selected=v.selected; legal=v.legal; taken=v.taken; animating=v.animating; aiThinking=v.aiThinking;
}
function hiddenMoveRecord(p,m,cap,promo,chk){
  return {ply:gameMoves.length+1,color:p[0],piece:p[1],from:files[m.fc]+(8-m.fr),to:files[m.tc]+(8-m.tr),capture:cap?cap[1]:null,captureName:cap?pname(cap):'',promotion:promo||'',check:chk,castle:m.castle||'',enPassant:!!m.enPassant,notation:moveNotation(p,m,cap,promo,chk)};
}
function finishHiddenLane(lane,result,meta){
  learnFromResult(result,meta||{});
  hiddenTrainingStats.hiddenGames++;
  hiddenTrainingStats.laneGames[lane.id]++;
  hiddenTrainingStats.lastReason[lane.id]=(meta&&meta.reason)||result;
  trainingDone++;
  Object.assign(lane,newHiddenLane(lane.id));
  if(trainingTarget && trainingDone>=trainingTarget) hiddenStopAfterRestore=true;
}
function hiddenPostMove(lane){
  const moves=allMoves(turn), checked=inCheck(turn);
  if(moves.length===0){
    if(checked){const winner=turn==='w'?'b':'w'; finishHiddenLane(lane,winner,{reason:'checkmate',winner,hidden:true});}
    else{finishHiddenLane(lane,'draw',{reason:'stalemate',stalemated:turn,causer:turn==='w'?'b':'w',advantage:materialAdvantage(),hidden:true});}
    return true;
  }
  const im=insufficientMaterialReason();
  if(im){finishHiddenLane(lane,'draw',{reason:'insufficient',advantage:materialAdvantage(),hidden:true});return true;}
  if(currentRepetitionCount()>=3){finishHiddenLane(lane,'draw',{reason:'repetition',advantage:materialAdvantage(),hidden:true});return true;}
  const np=drawByNoProgress();
  if(np){finishHiddenLane(lane,'draw',{reason:trainingMode?'training30':'fifty',advantage:materialAdvantage(),hidden:true});return true;}
  return false;
}
function stepHiddenLane(lane){
  if(!parallelTraining||!trainingMode)return;
  loadLaneState(lane);
  const moves=allMoves(turn);
  if(!moves.length){hiddenPostMove(lane); storeLaneState(lane); return;}
  const color=turn;
  const key=learnKey(color);
  const oldBias=trainingExploreBias;
  const laneBias=[1.25,1.75,2.35][lane.id]||1.25; // A小探索、B中探索、C大探索
  trainingExploreBias=laneBias;
  const m=chooseAIMove(color,'auto',moves);
  trainingExploreBias=oldBias;
  const p=B[m.fr][m.fc];
  const cap=m.enPassant?B[m.capr][m.capc]:B[m.tr][m.tc];
  history.push({B:clone(B),turn,taken:{w:[],b:[]},lastMove:null,castling:cloneCastling(),enPassant:enPassant?{...enPassant}:null,halfmoveClock});
  if(p&&p[0]) learnTrace[p[0]].push({key,move:moveCode(m)});
  apply(m,'q'); updateSpecialState(m,p);
  const opp=color==='w'?'b':'w';
  const chk=inCheck(opp);
  const progress=!!cap||p[1]==='p';
  halfmoveClock=progress?0:halfmoveClock+1;
  moveTrace.push({color:p[0],piece:p[1],check:chk,cap:!!cap,progress,code:moveCode(m)});
  gameMoves.push(hiddenMoveRecord(p,m,cap,'q',chk));
  hiddenTrainingStats.totalHiddenMoves++;
  turn=opp;
  hiddenPostMove(lane);
  storeLaneState(lane);
}
function updateParallelTrainPanel(){
  const el=document.getElementById('parallelTrainPanel'); if(!el)return;
  if(!developerMode){el.innerHTML='🔒 四格高速訓練：鎖定中｜右上角輸入密碼解鎖';return;}
  if(!parallelTraining){el.innerHTML='🔓 四格高速訓練：已解鎖，尚未啟動';return;}
  el.innerHTML=`四局差異化訓練中：主局保守0.75 + A探索1.25 + B探索1.75 + C探索2.35<br>總完成：${trainingDone}${trainingTarget?' / '+trainingTarget:' / ∞'}｜隱藏完成：${hiddenTrainingStats.hiddenGames}<br>隱藏局：A ${hiddenTrainingStats.laneGames[0]}（${hiddenTrainingStats.lastReason[0]}）｜B ${hiddenTrainingStats.laneGames[1]}（${hiddenTrainingStats.lastReason[1]}）｜C ${hiddenTrainingStats.laneGames[2]}（${hiddenTrainingStats.lastReason[2]}）`;
}
function startHiddenTrainingLanes(){
  hiddenTrainingLanes=[newHiddenLane(0),newHiddenLane(1),newHiddenLane(2)];
  hiddenTrainingStats={hiddenGames:0,totalHiddenMoves:0,laneGames:[0,0,0],lastReason:['-','-','-']};
  hiddenStopAfterRestore=false;
  parallelTraining=true;
  if(hiddenTrainingTimer)clearInterval(hiddenTrainingTimer);
  hiddenTrainingTimer=setInterval(()=>{
    if(!parallelTraining||!trainingMode)return;
    const visible=saveVisibleStateForHidden();
    try{
      for(const lane of hiddenTrainingLanes){
        // 每個隱藏棋局每輪走一步；實際效果是四局同時往前推進。
        stepHiddenLane(lane);
        if(hiddenStopAfterRestore)break;
      }
    }catch(e){console.error('隱藏訓練錯誤',e);}
    restoreVisibleStateForHidden(visible);
    updateParallelTrainPanel();
    if(hiddenStopAfterRestore){hiddenStopAfterRestore=false; stopTrainingV27();}
  },18);
}
function stopHiddenTrainingLanes(){
  parallelTraining=false;
  if(hiddenTrainingTimer){clearInterval(hiddenTrainingTimer);hiddenTrainingTimer=null;}
  updateParallelTrainPanel();
}
function startTrainingV27(){
  if(!developerMode){ unlockDeveloperMode(true); if(!developerMode)return; }
  const sel=document.getElementById('trainCount');
  trainingTarget=Number(sel&&sel.value||100);
  trainingDone=0;
  trainingMode=true;
  trainingExploreBias=0.75; // 主棋局：偏保守，負責驗證已知好路線
  trainingOldModes={w:document.getElementById('whiteMode').value,b:document.getElementById('blackMode').value};
  document.getElementById('whiteMode').value='auto';
  document.getElementById('blackMode').value='auto';
  syncModes();
  if(developerMode) log(`四局AI訓練開始：主棋局 + 3個隱藏棋局，大師級AI互練，目標 ${trainingTarget||'無限'} 局。好局會依同一套評分進精華庫。`); else log('四局AI訓練開始。');
  startHiddenTrainingLanes();
  init();
  updateParallelTrainPanel();
}
function stopTrainingV27(){
  stopHiddenTrainingLanes();
  trainingMode=false;
  trainingExploreBias=1.0;
  if(trainingOldModes){
    document.getElementById('whiteMode').value=trainingOldModes.w;
    document.getElementById('blackMode').value=trainingOldModes.b;
    trainingOldModes=null;
  }
  syncModes();
  saveLearnDB();
  if(developerMode) log(`四局AI訓練停止：本次完成 ${trainingDone} 局，其中隱藏棋局完成 ${hiddenTrainingStats.hiddenGames} 局。經驗庫已保存。`); else log('四局AI訓練停止。經驗庫已保存。');
  render();
  updateParallelTrainPanel();
}
const trainFastBtn=document.getElementById('trainFastBtn');
const devUnlockBtn=document.getElementById('devUnlockBtn');
function unlockDeveloperMode(fromFastButton=false){
  const pwd=prompt('請輸入開發者密碼');
  if(pwd==='6028'){
    developerMode=true;
    document.body.classList.add('devMode');
    if(devUnlockBtn){devUnlockBtn.textContent='🔓 開發者';devUnlockBtn.classList.add('unlocked');}
    log('開發者模式已解鎖：四格高速訓練可用。');
    updateParallelTrainPanel();
    render();
    return true;
  }
  if(pwd!==null) alert('密碼錯誤');
  if(fromFastButton) log('四格高速訓練未啟動：密碼錯誤或取消。');
  return false;
}
function stopAnyTraining(){
  if(parallelTraining) stopTrainingV27();
  else stopTraining();
}
if(trainBtn)trainBtn.onclick=startTraining;
if(trainFastBtn)trainFastBtn.onclick=startTrainingV27;

window.addEventListener('error', e=>{
  const s=document.getElementById('status');
  if(s) s.innerHTML='<b style="color:#ff8a8a">程式錯誤：</b>'+e.message+'<br>已啟動棋盤保護模式，請重新開局或回報此畫面。';
  try{fallbackRenderBoard();}catch(_){}
});
function fallbackRenderBoard(){
  const b=document.getElementById('board'); if(!b)return;
  if(b.children&&b.children.length>=64)return;
  const start=[['br','bn','bb','bq','bk','bb','bn','br'],['bp','bp','bp','bp','bp','bp','bp','bp'],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],['wp','wp','wp','wp','wp','wp','wp','wp'],['wr','wn','wb','wq','wk','wb','wn','wr']];
  const uni={wk:'♔',wq:'♕',wr:'♖',wb:'♗',wn:'♘',wp:'♙',bk:'♚',bq:'♛',br:'♜',bb:'♝',bn:'♞',bp:'♟'};
  b.innerHTML='';
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){const cell=document.createElement('div');cell.className='cell '+((r+c)%2?'dark':'light');cell.dataset.r=r;cell.dataset.c=c;const p=start[r][c];cell.innerHTML='<span class="coord">'+(r===7?files[c]:'')+(c===0?8-r:'')+'</span>'+(p?'<div class="piece '+(p[0]==='w'?'white':'black')+'" style="font-size:70px;display:flex;align-items:center;justify-content:center">'+uni[p]+'</div>':'');b.appendChild(cell);}
}
function safeBoot(){
  try{init();}
  catch(e){
    console.error(e);
    const s=document.getElementById('status');
    if(s)s.innerHTML='<b style="color:#ff8a8a">啟動修正：</b>'+e.message+'<br>已用保護模式顯示棋盤。';
    fallbackRenderBoard();
  }
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',safeBoot);else safeBoot();
